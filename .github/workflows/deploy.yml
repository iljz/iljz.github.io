name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    # This ensures the action ONLY triggers if files inside /frontend change
    paths:
      - 'frontend/**' 

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # CRITICAL STEP: Tells all 'run' commands to execute inside the frontend folder
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # You can adjust this to your preferred Node version

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to your frontend build output folder (e.g., dist or build)
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4